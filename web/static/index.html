<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#eef3f8" />
    <title>Maix Converter Platform</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script defer src="/static/app.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img class="brand-mark" src="/static/sipeed.png" alt="Sipeed" />
        <div class="brand-copy">
          <h1>Maix Converter</h1>
          <p data-i18n="app.subtitle">MaixCam / MaixCam2 模型转换工作台</p>
        </div>
      </div>
      <div class="top-actions">
        <div class="language-control">
          <label for="languageSelect" data-i18n="app.language">语言</label>
          <select id="languageSelect" aria-label="Language">
            <option value="zh-CN">中文</option>
            <option value="en-US">English</option>
          </select>
        </div>
        <button id="themeButton" class="ghost-button" type="button" data-i18n="actions.theme">主题</button>
        <span id="serverState" class="server-state checking" data-i18n="server.checking">API 检查中</span>
      </div>
    </header>

    <main class="layout">
      <section class="panel form-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow" data-i18n="jobForm.eyebrow">新建任务</p>
            <h2 data-i18n="jobForm.title">转换任务</h2>
          </div>
          <span class="pill">Docker</span>
        </div>

        <form id="jobForm" class="job-form">
          <fieldset class="form-group upload-group">
            <legend data-i18n="jobForm.filesGroup">输入文件</legend>
            <label class="field upload-field">
              <span class="field-label" data-i18n="jobForm.modelFile">模型文件</span>
              <input id="modelFile" class="native-file" name="model" type="file" accept=".pt,.onnx" required />
              <span class="upload-card">
                <span class="upload-icon">PT</span>
                <span class="upload-copy">
                  <strong data-i18n="jobForm.modelChoose">选择模型文件</strong>
                  <small id="modelFileHelp" data-i18n="jobForm.modelHelp">支持 .pt / .onnx</small>
                  <small class="upload-hint" data-i18n="jobForm.dragHint">点击选择，或拖拽文件到这里</small>
                </span>
              </span>
            </label>

            <label class="field upload-field">
              <span class="field-label" data-i18n="jobForm.datasetFile">量化数据集</span>
              <input id="datasetFile" class="native-file" name="dataset" type="file" accept=".zip" required />
              <span class="upload-card">
                <span class="upload-icon">ZIP</span>
                <span class="upload-copy">
                  <strong data-i18n="jobForm.datasetChoose">选择数据集</strong>
                  <small id="datasetFileHelp" data-i18n="jobForm.datasetHelp">上传包含量化图片的 .zip 文件</small>
                  <small class="upload-hint" data-i18n="jobForm.dragHint">点击选择，或拖拽文件到这里</small>
                </span>
              </span>
            </label>
          </fieldset>

          <input id="modelName" name="model_name" type="hidden" />

          <fieldset class="form-group target-group">
            <legend data-i18n="jobForm.targetGroup">目标平台</legend>
            <div class="field">
              <span data-i18n="jobForm.target">目标设备</span>
              <div class="segmented">
                <label>
                  <input type="radio" name="target" value="maixcam2" checked />
                  <span>
                    <strong>MaixCam2</strong>
                    <small>AX620E</small>
                  </span>
                </label>
                <label>
                  <input type="radio" name="target" value="maixcam" />
                  <span>
                    <strong>MaixCAM / Pro</strong>
                    <small>CV181x</small>
                  </span>
                </label>
              </div>
            </div>
          </fieldset>

          <fieldset class="form-group params-group">
            <legend data-i18n="jobForm.paramsGroup">转换参数</legend>
            <label class="field">
              <span data-i18n="jobForm.yoloVersion">YOLO 版本</span>
              <select id="yoloVersion" name="yolo_version">
                <option value="yolo26">YOLO26</option>
                <option value="yolo11">YOLO11</option>
                <option value="yolov8">YOLOv8</option>
              </select>
            </label>

            <div class="grid-two">
              <label class="field">
                <span data-i18n="jobForm.imagesNum">图片数量</span>
                <input id="imagesNum" name="images_num" type="number" min="1" max="5000" value="100" required />
              </label>
              <label class="field checkbox-field">
                <input name="fast" type="checkbox" checked />
                <span data-i18n="jobForm.fastMode">快速模式</span>
              </label>
            </div>

            <div class="grid-two">
              <label class="field">
                <span data-i18n="jobForm.width">宽度</span>
                <input id="imgszWidth" name="imgsz_width" type="number" min="32" max="4096" step="32" value="640" required />
              </label>
              <label class="field">
                <span data-i18n="jobForm.height">高度</span>
                <input id="imgszHeight" name="imgsz_height" type="number" min="32" max="4096" step="32" value="480" required />
              </label>
            </div>
          </fieldset>

          <button id="submitButton" class="primary-button" type="submit" data-i18n="actions.startConvert">开始转换</button>
          <div class="progress" data-i18n-aria-label="upload.progressAria" aria-label="上传进度">
            <span id="uploadProgressBar"></span>
          </div>
          <p id="uploadProgressText" class="progress-text" data-i18n="upload.waiting">等待上传</p>
        </form>
      </section>

      <section class="panel monitor-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow" data-i18n="monitor.eyebrow">实时状态</p>
            <h2 data-i18n="monitor.title">任务监控</h2>
          </div>
          <span id="jobStatus" class="status idle" data-i18n="status.notStarted">未开始</span>
        </div>

        <div class="job-summary">
          <div>
            <span>Job ID</span>
            <strong id="jobId">-</strong>
          </div>
          <div>
            <span data-i18n="monitor.model">模型</span>
            <strong id="jobModel">-</strong>
          </div>
          <div>
            <span data-i18n="monitor.doneAt">完成时间</span>
            <strong id="jobDone">-</strong>
          </div>
          <div>
            <span data-i18n="monitor.config">配置</span>
            <strong id="jobConfig">-</strong>
          </div>
        </div>

        <div id="stageProgress" class="stages" aria-label="Conversion progress">
          <span data-stage="prepare"><b>01</b><em data-i18n="stage.prepare">数据集准备</em></span>
          <span data-stage="export"><b>02</b><em data-i18n="stage.export">ONNX 导出</em></span>
          <span data-stage="prebuild"><b>03</b><em data-i18n="stage.prebuild">任务准备</em></span>
          <span data-stage="convert"><b>04</b><em data-i18n="stage.convert">模型转换</em></span>
          <span data-stage="package"><b>05</b><em data-i18n="stage.package">打包结果</em></span>
        </div>

        <p id="jobError" class="job-error" hidden></p>

        <div class="actions">
          <button id="refreshButton" class="secondary-button" type="button" data-i18n="actions.refresh">刷新</button>
          <button id="cancelJobButton" class="danger-button" type="button" hidden data-i18n="actions.cancel">取消任务</button>
          <a id="downloadButton" class="download-button disabled" href="#" aria-disabled="true" data-i18n="actions.downloadResult">下载结果</a>
        </div>

        <div class="log-toolbar">
          <button id="logCopyBtn" class="secondary-button" type="button" data-i18n="actions.copyLog">复制日志</button>
          <button id="logDownloadBtn" class="secondary-button" type="button" data-i18n="actions.downloadLog">下载日志</button>
          <button id="logClearBtn" class="secondary-button" type="button" data-i18n="actions.clearDisplay">清空显示</button>
          <label>
            <input id="logAutoScroll" type="checkbox" checked />
            <span data-i18n="actions.autoScroll">自动滚动</span>
          </label>
        </div>
        <pre id="logView" class="log-view" data-i18n="log.waiting">等待任务输出...</pre>
      </section>
    </main>

    <section class="jobs-section">
      <div class="jobs-head">
        <div>
          <p class="eyebrow" data-i18n="jobs.eyebrow">历史记录</p>
          <h2 data-i18n="jobs.title">最近任务</h2>
        </div>
        <button id="reloadJobs" class="secondary-button" type="button" data-i18n="actions.updateList">更新列表</button>
      </div>
      <div id="jobsFilter" class="filters">
        <button class="filter active" type="button" data-filter="all" data-i18n="filter.all">全部</button>
        <button class="filter" type="button" data-filter="running" data-i18n="filter.running">运行中</button>
        <button class="filter" type="button" data-filter="success" data-i18n="filter.success">已完成</button>
        <button class="filter" type="button" data-filter="failed" data-i18n="filter.failed">失败</button>
        <button class="filter" type="button" data-filter="cancelled" data-i18n="filter.cancelled">已取消</button>
        <span id="jobsCount"></span>
      </div>
      <div id="jobsList" class="jobs-list"></div>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
